<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Sakura Sushi Catering</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>
  <main class="wrap">
    <section>
      <h1>Owner Admin</h1>
      <p><small>Data is stored locally in this browser (localStorage). No login — this is a static demo tool.</small></p>
    </section>

    <section id="requests">
      <h2>Quote Requests</h2>
      <p id="requests-empty" style="display:none"><em>No quote requests yet.</em></p>
      <div id="requests-list"></div>
    </section>

    <section id="prices">
      <h2>Edit Menu Prices</h2>
      <p>Changes apply immediately across the public site. Prices persist in this browser.</p>
      <button type="button" id="btn-reset-prices" class="btn">Restore default prices</button>
      <div id="price-editor"></div>
    </section>
  </main>
  <footer id="site-footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/site.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
